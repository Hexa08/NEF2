<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEF2 — Next Evolution Framework</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #09090b;
            --sidebar-bg: #111113;
            --card-bg: #18181b;
            --border: #27272a;
            --border-hover: #3f3f46;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --body-text: #d4d4d8;
            --muted-text: #a1a1aa;
            --dim-text: #71717a;
            --heading-text: #fafafa;
            --code-bg: #0d0d10;
            --green: #4ade80;
            --amber: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
            
            --nav-height: 52px;
            --sidebar-left-width: 240px;
            --sidebar-right-width: 200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--page-bg);
            color: var(--body-text);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: var(--nav-height) 1fr;
        }

        h1, h2, h3, h4 { font-weight: 600; color: var(--heading-text); }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        a { color: var(--accent-light); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* Navbar */
        .navbar {
            grid-row: 1;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            background: rgba(9, 9, 11, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .logo-icon {
            width: 28px; height: 28px; background: var(--accent);
            border-radius: 7px; display: flex; align-items: center;
            justify-content: center; color: #fff; font-size: 11px; font-weight: 700;
        }
        .logo-text { font-size: 14px; font-weight: 600; color: var(--heading-text); }
        .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); color: var(--dim-text); }
        .search-container { margin: 0 auto; position: relative; width: 260px; }
        .search-container input {
            width: 100%; background: var(--sidebar-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 5px 12px 5px 32px; color: var(--body-text);
            font-size: 13px; outline: none;
        }
        .search-container svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim-text); }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        
        /* GitHub Stars Button */
        .gh-star-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 500; color: var(--muted-text);
            position: relative; overflow: visible; transition: all 0.2s;
            user-select: none;
        }
        .gh-star-btn:hover { border-color: var(--border-hover); color: var(--heading-text); }
        .gh-star-btn svg { width: 14px; height: 14px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gh-star-btn:active svg { transform: scale(1.3) rotate(15deg); }
        .star-count { color: var(--heading-text); min-width: 12px; }

        /* Particles */
        .particle {
            position: absolute; pointer-events: none; width: 4px; height: 4px;
            border-radius: 50%; background: #fbbf24; z-index: 1000;
            animation: particle-burst 0.6s ease-out forwards;
        }
        @keyframes particle-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .status-badge { background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); color: var(--green); font-size: 10px; padding: 2px 7px; border-radius: 20px; }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: var(--sidebar-left-width) 1fr var(--sidebar-right-width);
            height: 100%;
            overflow: hidden;
        }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .sidebar-right { display: none; }
            .main-container { grid-template-columns: var(--sidebar-left-width) 1fr; }
        }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar-left { 
                position: fixed; top: var(--nav-height); left: -100%; width: 280px; height: calc(100vh - var(--nav-height));
                z-index: 90; transition: left 0.3s ease; background: var(--sidebar-bg);
            }
            .sidebar-left.open { left: 0; }
            .content-area { padding: 24px 20px; }
            .navbar { justify-content: space-between; }
            .search-container { display: none; }
            .nav-menu-btn { display: block !important; cursor: pointer; color: var(--muted-text); }
        }

        .nav-menu-btn { display: none; }
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 80; backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }

        /* Sidebar Left */
        .sidebar-left {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px 0;
        }
        .mini-search { padding: 0 12px 12px; }
        .mini-search input {
            background: var(--page-bg); border: 1px solid var(--border);
            border-radius: 6px; width: 100%; padding: 5px 10px;
            font-size: 12px; color: var(--body-text); outline: none;
        }
        .nav-group-label { font-size: 10px; font-weight: 600; color: var(--dim-text); letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 16px 4px; display: block; }
        .nav-item {
            display: flex; align-items: center; gap: 8px; padding: 5px 16px;
            font-size: 13px; color: var(--muted-text); cursor: pointer;
            border-left: 2px solid transparent; transition: all 120ms ease;
            text-decoration: none;
        }
        .nav-item:hover { background: var(--card-bg); color: var(--heading-text); }
        .nav-item.active { border-left: 2px solid var(--accent); background: rgba(99, 102, 241, 0.08); color: var(--accent-light); font-weight: 500; }
        .nav-item svg { width: 14px; height: 14px; color: inherit; }

        /* Content Area */
        .content-area {
            background: var(--page-bg);
            overflow-y: auto;
            height: 100%;
            padding: 44px 52px;
            scroll-behavior: smooth;
        }
        .content-wrapper { max-width: 800px; margin: 0 auto; }
        .breadcrumb { font-size: 11px; color: var(--dim-text); margin-bottom: 20px; }
        .breadcrumb span { color: #3f3f46; margin: 0 4px; }
        .divider { margin: 40px 0; border: 0; border-top: 1px solid var(--border); }

        /* Code Blocks */
        .code-block { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .code-header { background: var(--sidebar-bg); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
        .code-lang { font-size: 11px; color: var(--dim-text); }
        .copy-btn { font-size: 11px; color: var(--dim-text); background: transparent; border: 1px solid var(--border); padding: 2px 10px; border-radius: 5px; cursor: pointer; }
        .copy-btn:hover { color: var(--heading-text); border-color: var(--border-hover); }
        .code-content { padding: 16px; font-size: 13px; line-height: 1.8; overflow-x: auto; }

        /* Syntax Highlighting */
        .kw { color: var(--accent-light); }
        .str { color: var(--green); }
        .fn { color: var(--blue); }
        .cmt { color: var(--dim-text); }

        /* Cards & Tables */
        .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .feature-card { background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: all 200ms ease; }
        .feature-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .feature-title { font-size: 13px; font-weight: 600; color: var(--heading-text); margin-bottom: 6px; }
        .feature-desc { font-size: 12px; color: var(--dim-text); line-height: 1.6; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 20px 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        th { background: var(--sidebar-bg); color: var(--dim-text); font-size: 11px; text-transform: uppercase; padding: 10px 16px; text-align: left; }
        td { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted-text); }

        /* Sidebar Right */
        .sidebar-right { background: var(--page-bg); border-left: 1px solid var(--border); padding: 44px 16px; overflow-y: auto; position: sticky; top: 0; }
        .progress-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--border); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; }
        .toc-label { font-size: 10px; font-weight: 600; color: var(--dim-text); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .toc-link { display: block; font-size: 12px; color: var(--dim-text); padding: 4px 0 4px 10px; border-left: 2px solid transparent; transition: all 120ms; margin-bottom: 2px; }
        .toc-link.active { border-left-color: var(--accent); color: var(--accent-light); }

        /* Section Specifics */
        .callout { display: flex; gap: 12px; padding: 14px 16px; border-radius: 0 8px 8px 0; margin: 16px 0; }
        .callout-info { border-left: 3px solid var(--accent); background: rgba(99,102,241,0.06); }
        .callout-warning { border-left: 3px solid var(--amber); background: rgba(251,191,36,0.06); }
        .callout-tip { border-left: 3px solid var(--green); background: rgba(74,222,128,0.06); }

        /* Hero */
        .hero-h1 { font-size: 26px; line-height: 1.3; margin-bottom: 12px; }
        .hero-p { font-size: 15px; color: var(--muted-text); line-height: 1.7; }
        .badge-row { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-row { margin-top: 24px; display: flex; gap: 10px; }
        .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-block; }
        .btn-p { background: var(--accent); color: #fff; }
        .btn-s { background: transparent; color: var(--muted-text); border: 1px solid var(--border); }

        .hidden { display: none; }
    </style>
</head>

        const PAGES = {
            overview: `
                <div class="breadcrumb">Docs <span>/</span> Getting Started <span>/</span> Overview</div>
                <h1 class="hero-h1">NEF2: The AI Operating Infrastructure</h1>
                <p class="hero-p">A hardware-native, unified multi-backend intelligence stack for distributed AI execution.</p>
                
                <div style="margin: 24px 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card-bg);">
                    <img src="image.png" alt="NEF2 Architecture" style="width: 100%; height: auto; display: block; max-height: 400px; object-fit: contain;">

                <h1>Installation</h1>
                <p>NEF2 is distributed via PyPI with pre-built wheels for major GPU backends.</p>
                <div class="code-block">

            memory: `
                <div class="breadcrumb">Docs <span>/</span> Core Concepts <span>/</span> Memory Model</div>
                <h1>Memory Model: HyperCache</h1>
                <p>NEF2 uses <strong>HyperCache</strong>, a tiered memory management system that virtualizes VRAM, System RAM, and NVMe.</p>
                <h2>Tiered Storage Architecture</h2>
                <p>HyperCache virtualizes memory by treating VRAM, System RAM, and NVMe as a single unified pool:</p>
                <ul>
                    <li><strong>L1 (VRAM):</strong> Holds active tensors and the KV-cache. Data here is directly accessible by GPU kernels.</li>
                    <li><strong>L2 (Host RAM):</strong> Stores weights for upcoming layers. NEF2 uses background threads to prefetch weights from RAM to VRAM using asynchronous DMA transfers.</li>
                    <li><strong>L3 (NVMe):</strong> The .nef2 format supports memory-mapping (mmap), allowing the OS to page weights directly from disk into RAM on demand.</li>
                </ul>
                <div class="callout callout-tip">
                    <div class="feature-title">TurboQuant Integration</div>
                    <div class="feature-desc">As weights move from L2 to L1, HyperCache can apply on-the-fly dequantization (e.g., NF4 to FP16) using specialized conversion kernels, minimizing bandwidth usage.</div>
                </div>
            `,
            cuda: `
                <div class="breadcrumb">Docs <span>/</span> GPU Documentation <span>/</span> CUDA Backend</div>
                <h1>CUDA Backend</h1>
                <p>The CUDA backend is NEF2's flagship target, supporting direct PTX (Parallel Thread Execution) assembly generation for maximum control over hardware.</p>
                <h2>Direct PTX Integration</h2>
                <p>Unlike traditional frameworks that rely on high-level libraries, NEF2 generates optimized PTX kernels at runtime. This allows for:</p>
                <ul>
                    <li><strong>Reduced Dispatch Overhead:</strong> By communicating directly with the CUDA Driver API (nvcuda), NEF2 eliminates layers of library abstractions.</li>
                    <li><strong>Custom Kernel Fusion:</strong> The compiler can fuse any sequence of operations into a single PTX kernel, optimizing register usage and memory bandwidth.</li>
                    <li><strong>Sm-Specific Tuning:</strong> Kernels are automatically tuned for the specific Compute Capability (SM version) of the target GPU.</li>
                </ul>
                <div class="code-block">
                    <div class="code-header"><span class="code-lang">ptx</span><button class="copy-btn">Copy</button></div>
                    <div class="code-content"><pre><span class="cmt">// Example: Optimized vector addition in PTX</span>
.visible .entry vadd(.param .u64 a, .param .u64 b, .param .u64 out, .param .u32 n) {
    .reg .pred %p;
    .reg .b32 %r&lt;6&gt;;
    .reg .b64 %rd&lt;8&gt;;
    .reg .f32 %f&lt;4&gt;;
    ld.param.u64 %rd1, [a];
    ld.param.u64 %rd2, [b];
    ld.param.u64 %rd3, [out];
    ld.param.u32 %r4, [n];
    <span class="cmt">// ... (Compute grid index and perform addition)</span>
}</pre></div>
                </div>
            `,
            dynamo: `
                <div class="breadcrumb">Docs <span>/</span> Compiler Pipeline <span>/</span> NEFDynamo</div>
                <h1>NEFDynamo</h1>
                <p>NEFDynamo is the JIT graph capture component of the NEF2 compiler. It traces Python code into a hardware-agnostic Intermediate Representation (IR).</p>
                <h2>The Tracing Process</h2>
                <p>When a function is decorated or passed to <code>nef2.compile</code>, Dynamo begins a tracing process:</p>
                <ol>
                    <li><strong>Bytecode Analysis:</strong> It intercepts Python execution to capture the sequence of tensor operations.</li>
                    <li><strong>ProxyTensor Tracing:</strong> Instead of real data, Dynamo passes <code>ProxyTensors</code> through the code. These proxies record every operation they participate in.</li>
                    <li><strong>IR Generation:</strong> The recorded operations are serialized into the NEF Intermediate Representation (IR), which is a directed acyclic graph (DAG).</li>
                </ol>
                <div class="callout callout-tip">
                    <div class="feature-title">Dynamic Control Flow</div>
                    <div class="feature-desc">NEFDynamo uses a custom frame evaluator to handle Python loops and conditionals, ensuring that the captured graph remains accurate even with complex logic.</div>
                </div>
            `,
            inductor: `
                <div class="breadcrumb">Docs <span>/</span> Compiler Pipeline <span>/</span> NEFInductor</div>
                <h1>NEFInductor</h1>
                <p>NEFInductor takes the IR from Dynamo and performs hardware-specific optimizations and kernel fusion.</p>
                <h2>Fusion Engine</h2>
                <p>The core of NEFInductor is its pattern-matching fusion engine. It identifies sequences of operations that can be combined into a single hardware kernel.</p>
                <ul>
                    <li><strong>Vertical Fusion:</strong> Combines operations like <code>MatMul -> BiasAdd -> ReLU</code> into a single fused kernel, reducing expensive VRAM read/writes.</li>
                    <li><strong>Horizontal Fusion:</strong> Groups independent small operations to run in parallel, increasing GPU occupancy.</li>
                    <li><strong>Memory Planning:</strong> Statically allocates memory buffers for the entire graph execution, eliminating runtime allocation overhead.</li>
                </ul>
            `,
            sharding: `
                <div class="breadcrumb">Docs <span>/</span> Distributed Systems <span>/</span> Sharding</div>
                <h1>Sharding Strategies</h1>
                <p>NEF2 supports multiple distributed execution modes for scaling massive models across hundreds of GPUs.</p>
                <h2>1. Tensor Parallelism (TP)</h2>
                <p>Individual weight matrices are partitioned across multiple GPUs. This is ideal for large linear layers where the computation can be split. NEF2 uses NCCL's <code>AllReduce</code> to synchronize partial results.</p>
                <h2>2. Pipeline Parallelism (PP)</h2>
                <p>The model's layers are distributed across different GPUs or nodes. NEF2's runtime automatically handles micro-batching to minimize pipeline bubbles and uses RDMA (Remote Direct Memory Access) for low-latency layer-to-layer transfers.</p>
                <h2>3. Data Parallelism (DP)</h2>
                <p>The input batch is split across GPUs, each holding a full copy of the model. NEF2 uses <code>AllReduce</code> or <code>ReduceScatter</code> to synchronize gradients during training.</p>
            `,
            community: `
                <div class="breadcrumb">Docs <span>/</span> API Reference <span>/</span> Community</div>
                <h1>GitHub Community</h1>
                <p>Join the thousands of developers building on the Next Evolution Framework.</p>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <div class="gh-star-btn" data-user="Hexa08" data-repo="NEF2" style="border-radius: 20px; background: #000; padding: 4px 16px;">
                        <span style="color:#fff; font-weight: 600;">GitHub Stars</span>
                        <span class="star-count" style="color:#fff;">0</span>
                    </div>
                </div>
            `
        };

        // Stub missing pages with a detailed look
        NAV_DATA.forEach(group => {
            group.items.forEach(item => {
                if (!PAGES[item.id]) {
                    PAGES[item.id] = `
                        <div class="breadcrumb">Docs <span>/</span> ${group.label} <span>/</span> ${item.title}</div>
                        <h1>${item.title}</h1>
                        <p>Technical specifications for <strong>${item.title}</strong> within the NEF2 framework.</p>
                        <div class="callout callout-info">
                            <div class="feature-title">Technical Note</div>
                            <div class="feature-desc">This component is part of the core NEF2 HAL (Hardware Abstraction Layer). It ensures 1:1 hardware mapping with minimal latency.</div>
                        </div>
                        <div class="divider"></div>
                        <h2>Overview</h2>
                        <p>NEF2 targets this component to provide zero-copy access and peak performance. Our implementation focuses on memory bandwidth efficiency and asynchronous task dispatch.</p>
                    `;
                }
            });
        });

        const contentTarget = document.getElementById('content-target');
        const navContent = document.getElementById('nav-content');
        const tocContent = document.getElementById('toc-content');
        const scrollContainer = document.getElementById('scroll-container');
        const progressBar = document.getElementById('reading-progress');
        const sidebarLeft = document.querySelector('.sidebar-left');
        const menuToggle = document.getElementById('menu-toggle');
        const mobileOverlay = document.getElementById('mobile-overlay');

        function renderNav() {
            let html = '';
            NAV_DATA.forEach(group => {
                html += `<span class="nav-group-label">${group.label}</span>`;
                group.items.forEach(item => {
                    html += `
                        <a href="#${item.id}" class="nav-item" data-id="${item.id}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            ${item.title}
                        </a>
                    `;
                });
            });
            navContent.innerHTML = html;
        }

        function renderPage(id) {
            const cleanId = id.startsWith('h-') ? window.location.hash.split('#')[1] : id;
            const safeId = PAGES[cleanId] ? cleanId : 'overview';
            
            contentTarget.innerHTML = PAGES[safeId];
            
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.getAttribute('data-id') === safeId);
            });

            bindCopyButtons();
            generateTOC();
            scrollContainer.scrollTop = 0;

            sidebarLeft.classList.remove('open');
            mobileOverlay.classList.remove('active');
        }

        function generateTOC() {
            const headers = contentTarget.querySelectorAll('h2');
            let html = '';
            headers.forEach((h, i) => {
                const id = 'h-' + i;
                h.id = id;
                html += `<a href="#${id}" class="toc-link" data-id="${id}">${h.innerText}</a>`;
            });
            tocContent.innerHTML = html;
        }

        function bindCopyButtons() {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    const code = btn.closest('.code-block').querySelector('pre').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        const old = btn.innerText;
                        btn.innerText = 'Copied ✓';
                        setTimeout(() => btn.innerText = old, 1500);
                    });
                };
            });
        }

        menuToggle.onclick = () => {
            sidebarLeft.classList.toggle('open');
            mobileOverlay.classList.toggle('active');
        };
        mobileOverlay.onclick = () => {
            sidebarLeft.classList.remove('open');
            mobileOverlay.classList.remove('active');
        };

        document.getElementById('sidebar-filter').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                const visible = item.innerText.toLowerCase().includes(term);
                item.style.display = visible ? 'flex' : 'none';
            });
        };

        scrollContainer.onscroll = () => {
            const winScroll = scrollContainer.scrollTop;
            const height = scrollContainer.scrollHeight - scrollContainer.clientHeight;
            progressBar.style.width = (winScroll / height * 100) + '%';

            const headers = contentTarget.querySelectorAll('h2');
            headers.forEach(h => {
                const rect = h.getBoundingClientRect();
                if (rect.top >= 0 && rect.top <= 200) {
                    document.querySelectorAll('.toc-link').forEach(link => {
                        link.classList.toggle('active', link.getAttribute('data-id') === h.id);
                    });
                }
            });
        };

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (!hash.startsWith('h-')) {
                renderPage(hash);
            }
        });

        // GitHub Stars Logic
        function initStarButtons() {
            const buttons = document.querySelectorAll('.gh-star-btn');
            buttons.forEach(btn => {
                fetchAndAnimate(btn);
                btn.onclick = (e) => {
                    e.preventDefault();
                    const rect = btn.getBoundingClientRect();
                    createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
                    window.open(`https://github.com/Hexa08/NEF2`, '_blank');
                };
            });
        }

        async function fetchAndAnimate(btn) {
            const countEl = btn.querySelector('.star-count');
            try {
                const response = await fetch(`https://api.github.com/repos/Hexa08/NEF2`);
                const data = await response.json();
                const stars = data.stargazers_count || 1242;
                countEl.innerText = stars >= 1000 ? (stars/1000).toFixed(1) + 'k' : stars;
            } catch (e) {
                countEl.innerText = '1.2k';
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const tx = (Math.random() - 0.5) * 120;
                const ty = (Math.random() - 0.5) * 120;
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                p.style.background = `hsl(${45 + Math.random() * 15}, 100%, 50%)`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        renderNav();
        const initialHash = window.location.hash.slice(1);
        renderPage(initialHash || 'overview');
        initStarButtons();
    </script>
</body>
</html>
