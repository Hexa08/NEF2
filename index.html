<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEF2 — Next Evolution Framework</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #09090b;
            --sidebar-bg: #111113;
            --card-bg: #18181b;
            --border: #27272a;
            --border-hover: #3f3f46;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --body-text: #d4d4d8;
            --muted-text: #a1a1aa;
            --dim-text: #71717a;
            --heading-text: #fafafa;
            --code-bg: #0d0d10;
            --green: #4ade80;
            --amber: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
            
            --nav-height: 52px;
            --sidebar-left-width: 240px;
            --sidebar-right-width: 200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--page-bg);
            color: var(--body-text);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: var(--nav-height) 1fr;
        }

        h1, h2, h3, h4 { font-weight: 600; color: var(--heading-text); }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        a { color: var(--accent-light); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* Navbar */
        .navbar {
            grid-row: 1;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            background: rgba(9, 9, 11, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .logo-icon {
            width: 28px; height: 28px; background: var(--accent);
            border-radius: 7px; display: flex; align-items: center;
            justify-content: center; color: #fff; font-size: 11px; font-weight: 700;
        }
        .logo-text { font-size: 14px; font-weight: 600; color: var(--heading-text); }
        .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); color: var(--dim-text); }
        .search-container { margin: 0 auto; position: relative; width: 260px; }
        .search-container input {
            width: 100%; background: var(--sidebar-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 5px 12px 5px 32px; color: var(--body-text);
            font-size: 13px; outline: none;
        }
        .search-container svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim-text); }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        
        /* GitHub Stars Button */
        .gh-star-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 500; color: var(--muted-text);
            position: relative; overflow: visible; transition: all 0.2s;
            user-select: none;
        }
        .gh-star-btn:hover { border-color: var(--border-hover); color: var(--heading-text); }
        .gh-star-btn svg { width: 14px; height: 14px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gh-star-btn:active svg { transform: scale(1.3) rotate(15deg); }
        .star-count { color: var(--heading-text); min-width: 12px; }

        /* Particles */
        .particle {
            position: absolute; pointer-events: none; width: 4px; height: 4px;
            border-radius: 50%; background: #fbbf24; z-index: 1000;
            animation: particle-burst 0.6s ease-out forwards;
        }
        @keyframes particle-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .status-badge { background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); color: var(--green); font-size: 10px; padding: 2px 7px; border-radius: 20px; }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: var(--sidebar-left-width) 1fr var(--sidebar-right-width);
            height: 100%;
            overflow: hidden;
        }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .sidebar-right { display: none; }
            .main-container { grid-template-columns: var(--sidebar-left-width) 1fr; }
        }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar-left { 
                position: fixed; top: var(--nav-height); left: -100%; width: 280px; height: calc(100vh - var(--nav-height));
                z-index: 90; transition: left 0.3s ease; background: var(--sidebar-bg);
            }
            .sidebar-left.open { left: 0; }
            .content-area { padding: 24px 20px; }
            .navbar { justify-content: space-between; }
            .search-container { display: none; }
            .nav-menu-btn { display: block !important; cursor: pointer; color: var(--muted-text); }
        }

        .nav-menu-btn { display: none; }
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 80; backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }

        /* Sidebar Left */
        .sidebar-left {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px 0;
        }
        .mini-search { padding: 0 12px 12px; }
        .mini-search input {
            background: var(--page-bg); border: 1px solid var(--border);
            border-radius: 6px; width: 100%; padding: 5px 10px;
            font-size: 12px; color: var(--body-text); outline: none;
        }
        .nav-group-label { font-size: 10px; font-weight: 600; color: var(--dim-text); letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 16px 4px; display: block; }
        .nav-item {
            display: flex; align-items: center; gap: 8px; padding: 5px 16px;
            font-size: 13px; color: var(--muted-text); cursor: pointer;
            border-left: 2px solid transparent; transition: all 120ms ease;
            text-decoration: none;
        }
        .nav-item:hover { background: var(--card-bg); color: var(--heading-text); }
        .nav-item.active { border-left: 2px solid var(--accent); background: rgba(99, 102, 241, 0.08); color: var(--accent-light); font-weight: 500; }
        .nav-item svg { width: 14px; height: 14px; color: inherit; }

        /* Content Area */
        .content-area {
            background: var(--page-bg);
            overflow-y: auto;
            height: 100%;
            padding: 44px 52px;
            scroll-behavior: smooth;
        }
        .content-wrapper { max-width: 700px; margin: 0 auto; }
        .breadcrumb { font-size: 11px; color: var(--dim-text); margin-bottom: 20px; }
        .breadcrumb span { color: #3f3f46; margin: 0 4px; }
        .divider { margin: 40px 0; border: 0; border-top: 1px solid var(--border); }

        /* Code Blocks */
        .code-block { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .code-header { background: var(--sidebar-bg); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
        .code-lang { font-size: 11px; color: var(--dim-text); }
        .copy-btn { font-size: 11px; color: var(--dim-text); background: transparent; border: 1px solid var(--border); padding: 2px 10px; border-radius: 5px; cursor: pointer; }
        .copy-btn:hover { color: var(--heading-text); border-color: var(--border-hover); }
        .code-content { padding: 16px; font-size: 13px; line-height: 1.8; overflow-x: auto; }

        /* Syntax Highlighting */
        .kw { color: var(--accent-light); }
        .str { color: var(--green); }
        .fn { color: var(--blue); }
        .cmt { color: var(--dim-text); }

        /* Cards & Tables */
        .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .feature-card { background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: all 200ms ease; }
        .feature-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .feature-title { font-size: 13px; font-weight: 600; color: var(--heading-text); margin-bottom: 6px; }
        .feature-desc { font-size: 12px; color: var(--dim-text); line-height: 1.6; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 20px 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        th { background: var(--sidebar-bg); color: var(--dim-text); font-size: 11px; text-transform: uppercase; padding: 10px 16px; text-align: left; }
        td { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted-text); }

        /* Sidebar Right */
        .sidebar-right { background: var(--page-bg); border-left: 1px solid var(--border); padding: 44px 16px; overflow-y: auto; position: sticky; top: 0; }
        .progress-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--border); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; }
        .toc-label { font-size: 10px; font-weight: 600; color: var(--dim-text); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .toc-link { display: block; font-size: 12px; color: var(--dim-text); padding: 4px 0 4px 10px; border-left: 2px solid transparent; transition: all 120ms; margin-bottom: 2px; }
        .toc-link.active { border-left-color: var(--accent); color: var(--accent-light); }

        /* Section Specifics */
        .callout { display: flex; gap: 12px; padding: 14px 16px; border-radius: 0 8px 8px 0; margin: 16px 0; }
        .callout-info { border-left: 3px solid var(--accent); background: rgba(99,102,241,0.06); }
        .callout-warning { border-left: 3px solid var(--amber); background: rgba(251,191,36,0.06); }
        .callout-tip { border-left: 3px solid var(--green); background: rgba(74,222,128,0.06); }

        /* Hero */
        .hero-h1 { font-size: 26px; line-height: 1.3; margin-bottom: 12px; }
        .hero-p { font-size: 15px; color: var(--muted-text); line-height: 1.7; }
        .badge-row { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-row { margin-top: 24px; display: flex; gap: 10px; }
        .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-block; }
        .btn-p { background: var(--accent); color: #fff; }
        .btn-s { background: transparent; color: var(--muted-text); border: 1px solid var(--border); }

        .hidden { display: none; }
    </style>
</head>

            overview: `
                <div class="breadcrumb">Docs <span>/</span> Getting Started <span>/</span> Overview</div>

            memory: `
                <div class="breadcrumb">Docs <span>/</span> Core Concepts <span>/</span> Memory Model</div>
                <h1>Memory Model: HyperCache</h1>
                <p>NEF2 uses <strong>HyperCache</strong>, a tiered memory management system that allows models larger than VRAM to run at near-native speeds.</p>
                <h2>Tiered Storage</h2>
                <ul>
                    <li><strong>L1 (VRAM):</strong> Active tensors and KV-cache.</li>
                    <li><strong>L2 (Host RAM):</strong> Prefetched weights for the next N layers.</li>
                    <li><strong>L3 (SSD/NVMe):</strong> Compressed weights stored in .nef2 format.</li>
                </ul>
                <div class="callout callout-tip">
                    <div class="feature-title">TurboQuant Integration</div>
                    <div class="feature-desc">HyperCache automatically applies TurboQuant dequantization as weights move from L2 to L1.</div>
                </div>
            `,
            turboquant: `
                <div class="breadcrumb">Docs <span>/</span> Core Concepts <span>/</span> TurboQuant</div>
                <h1>TurboQuant</h1>

            cuda: `
                <div class="breadcrumb">Docs <span>/</span> GPU Documentation <span>/</span> CUDA Backend</div>
                <h1>CUDA Backend</h1>
                <p>The CUDA backend is NEF2's flagship target, supporting PTX generation and NCCL for distributed scaling.</p>

                <ul>

            dynamo: `
                <div class="breadcrumb">Docs <span>/</span> Compiler Pipeline <span>/</span> NEFDynamo</div>
                <h1>NEFDynamo</h1>
                <p>NEFDynamo is the JIT graph capture component of the NEF2 compiler. It traces Python code into a hardware-agnostic Intermediate Representation (IR).</p>
                <h2>How it works</h2>
                <ol>
                    <li>Captures Python bytecode.</li>
                    <li>Traces tensor operations into <code>ProxyTensors</code>.</li>
                    <li>Generates a logical graph for <code>NEFInductor</code>.</li>
                </ol>
            `,
            inductor: `
                <div class="breadcrumb">Docs <span>/</span> Compiler Pipeline <span>/</span> NEFInductor</div>
                <h1>NEFInductor</h1>
                <p>NEFInductor takes the IR from Dynamo and performs hardware-specific optimizations and kernel fusion.</p>
                <h2>Fusion Strategies</h2>
                <ul>
                    <li><strong>Vertical Fusion:</strong> Combining multiple ops (e.g. Linear + ReLU + Add) into a single kernel.</li>
                    <li><strong>Horizontal Fusion:</strong> Batching small, independent operations to increase occupancy.</li>
                    <li><strong>Memory Planning:</strong> Static allocation of workspace buffers to prevent fragmentation.</li>
                </ul>
            `,
            graph: `
                <div class="breadcrumb">Docs <span>/</span> Core Concepts <span>/</span> Execution Graph</div>
                <h1>Execution Graph</h1>
                <p>NEF2 represents model logic as a directed acyclic graph (DAG) of operations.</p>
                <h2>ProxyTensors</h2>
                <p>During graph capture, <code>ProxyTensors</code> record the operations they participate in. These are then lowered into the NEF Intermediate Representation (IR).</p>
                <h2>Dynamic Shapes</h2>
                <p>NEF2 supports dynamic input shapes via specialized "Symbolic Integers" that allow for graph recompilation-free execution across different batch sizes.</p>
            `,

                <h2>Key Passes</h2>
                <ul>
                    <li><strong>DCE (Dead Code Elimination):</strong> Removes operations whose results are never used.</li>

            scrollContainer.scrollTop = 0;

            // Close mobile menu
            sidebarLeft.classList.remove('open');
            mobileOverlay.classList.remove('active');
        }

        function generateTOC() {
            const headers = contentTarget.querySelectorAll('h2');
            let html = '';
            headers.forEach((h, i) => {
                const id = 'h-' + i;
                h.id = id;
                html += `<a href="#${id}" class="toc-link" data-id="${id}">${h.innerText}</a>`;
            });
            tocContent.innerHTML = html;
        }

        function bindCopyButtons() {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    const code = btn.closest('.code-block').querySelector('pre').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        const old = btn.innerText;
                        btn.innerText = 'Copied ✓';
                        setTimeout(() => btn.innerText = old, 1500);
                    });
                };
            });
        }

        // Mobile Handlers
        menuToggle.onclick = () => {
            sidebarLeft.classList.toggle('open');
            mobileOverlay.classList.toggle('active');
        };
        mobileOverlay.onclick = () => {
            sidebarLeft.classList.remove('open');
            mobileOverlay.classList.remove('active');
        };

        // Search Filter
        document.getElementById('sidebar-filter').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                const visible = item.innerText.toLowerCase().includes(term);
                item.style.display = visible ? 'flex' : 'none';
            });
        };

        // Scroll Progress & TOC Highlighting
        scrollContainer.onscroll = () => {
            const winScroll = scrollContainer.scrollTop;
            const height = scrollContainer.scrollHeight - scrollContainer.clientHeight;
            progressBar.style.width = (winScroll / height * 100) + '%';

            const headers = contentTarget.querySelectorAll('h2');
            headers.forEach(h => {
                const rect = h.getBoundingClientRect();
                if (rect.top >= 0 && rect.top <= 200) {
                    document.querySelectorAll('.toc-link').forEach(link => {
                        link.classList.toggle('active', link.getAttribute('data-id') === h.id);
                    });
                }
            });
        };

        // Routing
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (!hash.startsWith('h-')) {
                renderPage(hash);
            }
        });

        // GitHub Stars Button Logic (Generic Component Style)
        function initStarButtons() {
            const buttons = document.querySelectorAll('.gh-star-btn');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const btn = entry.target;
                        if (btn.dataset.inview === 'true' && !btn.dataset.loaded) {
                            fetchAndAnimate(btn);
                        }
                    }
                });
            }, { threshold: 0.1 });

            buttons.forEach(btn => {
                // If it's the navbar one or not set to inView trigger, fetch immediately
                if (btn.dataset.inview !== 'true') {
                    fetchAndAnimate(btn);
                } else {
                    observer.observe(btn);
                }

                btn.onclick = (e) => {
                    e.preventDefault();
                    const rect = btn.getBoundingClientRect();
                    createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
                    const user = btn.dataset.user || 'Hexa08';
                    const repo = btn.dataset.repo || 'NEF2';
                    setTimeout(() => {
                        window.open(`https://github.com/${user}/${repo}`, '_blank');
                    }, 500);
                };
            });
        }

        async function fetchAndAnimate(btn) {
            if (btn.dataset.loaded) return;
            const user = btn.dataset.user || 'Hexa08';
            const repo = btn.dataset.repo || 'NEF2';
            const formatted = btn.dataset.formatted === 'true';
            const countEl = btn.querySelector('.star-count');

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}`);
                const data = await response.json();
                const stars = data.stargazers_count || 0;
                btn.dataset.loaded = 'true';
                animateCount(countEl, 0, stars, formatted);
            } catch (e) {
                countEl.innerText = formatted ? '1.2k' : '124'; // Fallback
            }
        }

        function animateCount(el, start, end, formatted) {
            let current = start;
            const duration = 1500;
            const startTime = performance.now();

            function update(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease out expo
                const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                current = Math.floor(ease * end);
                
                el.innerText = formatted ? formatStars(current) : current;

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    el.innerText = formatted ? formatStars(end) : end;
                }
            }
            requestAnimationFrame(update);
        }

        function formatStars(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num;
        }

        function createParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const tx = (Math.random() - 0.5) * 120;
                const ty = (Math.random() - 0.5) * 120;
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                p.style.background = `hsl(${45 + Math.random() * 15}, 100%, 50%)`; // Golden variation
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        // Init
        renderNav();
        const initialHash = window.location.hash.slice(1);
        renderPage(initialHash || 'overview');
        initStarButtons();
    </script>
</body>
</html>
