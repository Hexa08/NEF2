    <style>
        :root {
            --page-bg: #09090b;
            --sidebar-bg: #111113;
            --card-bg: #18181b;
            --border: #27272a;
            --border-hover: #3f3f46;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --body-text: #d4d4d8;
            --muted-text: #a1a1aa;
            --dim-text: #71717a;
            --heading-text: #fafafa;
            --code-bg: #0d0d10;
            --green: #4ade80;
            --amber: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
            
            --nav-height: 52px;
            --sidebar-left-width: 240px;
            --sidebar-right-width: 200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--page-bg);
            color: var(--body-text);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: var(--nav-height) 1fr;

        h1, h2, h3, h4 { font-weight: 600; color: var(--heading-text); }
        code, pre { font-family: 'JetBrains Mono', monospace; }
        a { color: var(--accent-light); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* Navbar */
        .navbar {
            grid-row: 1;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            background: rgba(9, 9, 11, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .logo-icon {
            width: 28px; height: 28px; background: var(--accent);
            border-radius: 7px; display: flex; align-items: center;
            justify-content: center; color: #fff; font-size: 11px; font-weight: 700;
        }
        .logo-text { font-size: 14px; font-weight: 600; color: var(--heading-text); }
        .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); color: var(--dim-text); }
        .search-container { margin: 0 auto; position: relative; width: 260px; }
        .search-container input {
            width: 100%; background: var(--sidebar-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 5px 12px 5px 32px; color: var(--body-text);
            font-size: 13px; outline: none;
        }
        .search-container svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim-text); }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        
        /* GitHub Stars Button */
        .gh-star-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 500; color: var(--muted-text);
            position: relative; overflow: visible; transition: all 0.2s;
            user-select: none;
        }
        .gh-star-btn:hover { border-color: var(--border-hover); color: var(--heading-text); }
        .gh-star-btn svg { width: 14px; height: 14px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gh-star-btn:active svg { transform: scale(1.3) rotate(15deg); }
        .star-count { color: var(--heading-text); min-width: 12px; }

        /* Particles */
        .particle {
            position: absolute; pointer-events: none; width: 4px; height: 4px;
            border-radius: 50%; background: #fbbf24; z-index: 1000;
            animation: particle-burst 0.6s ease-out forwards;
        }
        @keyframes particle-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .status-badge { background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); color: var(--green); font-size: 10px; padding: 2px 7px; border-radius: 20px; }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: var(--sidebar-left-width) 1fr var(--sidebar-right-width);
            height: 100%;
            overflow: hidden;
        }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .sidebar-right { display: none; }
            .main-container { grid-template-columns: var(--sidebar-left-width) 1fr; }
        }

            .content-area { padding: 24px 20px; }
            .navbar { justify-content: space-between; }
            .search-container { display: none; }
            .nav-menu-btn { display: block !important; cursor: pointer; color: var(--muted-text); }
        }

        .nav-menu-btn { display: none; }
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 80; backdrop-filter: blur(4px);
        }

        .breadcrumb { font-size: 11px; color: var(--dim-text); margin-bottom: 20px; }
        .breadcrumb span { color: #3f3f46; margin: 0 4px; }
        .divider { margin: 40px 0; border: 0; border-top: 1px solid var(--border); }

        /* Code Blocks */
        .code-block { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .code-header { background: var(--sidebar-bg); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
        .code-lang { font-size: 11px; color: var(--dim-text); }
        .copy-btn { font-size: 11px; color: var(--dim-text); background: transparent; border: 1px solid var(--border); padding: 2px 10px; border-radius: 5px; cursor: pointer; }
        .copy-btn:hover { color: var(--heading-text); border-color: var(--border-hover); }
        .code-content { padding: 16px; font-size: 13px; line-height: 1.8; overflow-x: auto; }

        /* Syntax Highlighting */
        .kw { color: var(--accent-light); }
        .str { color: var(--green); }
        .fn { color: var(--blue); }
        .cmt { color: var(--dim-text); }

        /* Cards & Tables */
        .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .feature-card { background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: all 200ms ease; }
        .feature-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .feature-title { font-size: 13px; font-weight: 600; color: var(--heading-text); margin-bottom: 6px; }
        .feature-desc { font-size: 12px; color: var(--dim-text); line-height: 1.6; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 20px 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        th { background: var(--sidebar-bg); color: var(--dim-text); font-size: 11px; text-transform: uppercase; padding: 10px 16px; text-align: left; }
        td { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted-text); }

        /* Sidebar Right */
        .sidebar-right { background: var(--page-bg); border-left: 1px solid var(--border); padding: 44px 16px; overflow-y: auto; position: sticky; top: 0; }
        .progress-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--border); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; }
        .toc-label { font-size: 10px; font-weight: 600; color: var(--dim-text); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .toc-link { display: block; font-size: 12px; color: var(--dim-text); padding: 4px 0 4px 10px; border-left: 2px solid transparent; transition: all 120ms; margin-bottom: 2px; }
        .toc-link.active { border-left-color: var(--accent); color: var(--accent-light); }

        .callout-info { border-left: 3px solid var(--accent); background: rgba(99,102,241,0.06); }

    </style>
</head>

                <div class="breadcrumb">Docs <span>/</span> Core Concepts <span>/</span> Tensor Layout</div>
                <h1>Tensor Memory Layouts</h1>
                
                <section>
                    <h3>What is it?</h3>
                    <p>A tensor layout is the physical arrangement of a multi-dimensional data structure in the computer's one-dimensional memory. While we think of tensors as 2D matrices or 3D volumes, hardware sees a long row of memory addresses. The layout defines the mapping between a coordinate (like row 2, column 5) and its actual location in that row.</p>
                </section>

                <section>
                    <h3>Why does it exist?</h3>
                    <p>Memory layouts solve the "Data Locality" problem. Hardware is most efficient when it can read data sequentially. If your math operation needs to access elements that are scattered across different parts of memory, the system spends more time waiting for data to arrive (memory latency) than it does performing calculations. Choosing the right layout aligns the data with the hardware's natural reading pattern.</p>
                </section>

                <section>
                    <h3>How does it work?</h3>
                    <p>Imagine organizing a stack of 100 books. You have a long shelf that fits exactly 100 books. You could store them by grouping all books by the same author together, or by grouping all books of the same genre. Your choice depends on how you plan to find them later. If you usually read everything by one author, the "Author-Major" layout is fastest. Tensor layouts use mathematical "strides"—the number of elements to skip to move one step in a given dimension—to navigate this shelf.</p>
                </section>

                <div class="divider"></div>

                <h2>Variant 1: Contiguous (Row-Major)</h2>
                <p>The standard layout where elements in the same row are stored adjacent to each other.</p>
                <div class="code-block">
                    <div class="code-header"><span class="code-lang">python</span><button class="copy-btn">Copy</button></div>
                    <div class="code-content"><pre><span class="kw">import</span> nef2
<span class="cmt"># Elements [1, 2, 3] are physically side-by-side in memory</span>
x = nef2.<span class="fn">Tensor</span>([[1, 2, 3], [4, 5, 6]], layout=<span class="str">"contiguous"</span>)</pre></div>
                </div>
                <p><strong>When to use:</strong> The default choice for general math, MLPs, and cross-platform compatibility.</p>

                <h1>HyperCache Memory Model</h1>
                
                <section>
                    <h3>What is it?</h3>
                    <p>HyperCache is a virtualized memory system that allows NEF2 to run AI models much larger than the available video memory (VRAM). It treats all available storage—VRAM, System RAM, and NVMe SSDs—as a single tiered hierarchy.</p>
                </section>

                <section>
                    <h3>Why does it exist?</h3>
                    <p>Modern Large Language Models (LLMs) often require 100GB+ of memory, while many consumer GPUs have only 8GB or 12GB. HyperCache solves the "Out of Memory" (OOM) error by transparently moving data between fast and slow storage without crashing the program.</p>
                </section>

                <section>
                    <h3>How does it work?</h3>
                    <p>Think of it like a chef in a kitchen. The <strong>VRAM</strong> is the cutting board (tiny but instant), the <strong>RAM</strong> is the fridge (large but you have to walk to it), and the <strong>NVMe</strong> is the basement pantry (huge but slow). HyperCache act as an assistant who looks at the recipe (the model graph) and brings the ingredients from the pantry to the fridge, and then to the cutting board, just seconds before the chef needs them. This process is called "Asynchronous Prefetching."</p>
                </section>

                <div class="divider"></div>

                <h2>The Three Tiers</h2>
                <ul>
                    <li><strong>L1 (VRAM):</strong> The "Hot" tier. Data here is directly processed by GPU kernels at 1TB/s+ bandwidth.</li>
                    <li><strong>L2 (System RAM):</strong> The "Warm" tier. Stores weights for the next few layers. NEF2 uses background DMA (Direct Memory Access) to pull this into VRAM while the GPU is busy calculating.</li>
                    <li><strong>L3 (NVMe/SSD):</strong> The "Cold" tier. The entire model sits here in .nef2 format, mapped into memory via <code>mmap</code>. Elements are paged in only when needed.</li>
                </ul>

                <div class="code-block">
                    <div class="code-header"><span class="code-lang">python</span><button class="copy-btn">Copy</button></div>

<span class="cmt"># Load a 70B model on a single 16GB GPU</span>
runtime = nef2.<span class="fn">Runtime</span>(device=<span class="str">"cuda"</span>, memory_mode=<span class="str">"hypercache"</span>)
model = runtime.<span class="fn">load</span>(<span class="str">"llama-3-70b.nef2"</span>)</pre></div>
                </div>

                <div class="divider"></div>

                <h3>Common Mistakes</h3>

                    <li><strong>Slow Disk:</strong> Using a mechanical hard drive (HDD) for L3. HyperCache depends on the low latency of NVMe SSDs to stay ahead of the GPU.</li>
                </ul>

                <p><strong>Key takeaway:</strong> HyperCache eliminates memory limits by treating VRAM as a fast cache for the model rather than its permanent home.</p>

                <h1>Sharding Strategies</h1>
                
                <section>
                    <h3>What is it?</h3>
                    <p>Sharding is the process of "breaking" a massive AI model into pieces so it can be handled by multiple GPUs at once. Since models can be hundreds of gigabytes, no single GPU can hold them entirely; sharding spreads the weight.</p>
                </section>

                <section>
                    <h3>Why does it exist?</h3>
                    <p>Large models like GPT-4 or Llama-3-405B physically cannot fit on one GPU. Sharding allows us to treat a cluster of 8, 64, or 1000 GPUs as if they were one giant "Super-GPU" with massive memory and compute power.</p>
                </section>

                <section>
                    <h3>How does it work?</h3>
                    <p>Imagine you are building a giant Lego castle that is too big for your table. You have three choices: 
                        1. **Data Parallelism:** Hire 4 friends to build 4 identical small castles on 4 tables.
                        2. **Tensor Parallelism:** Cut the castle vertically and have 4 friends build different "slices" of the same big castle.
                        3. **Pipeline Parallelism:** Have one friend build the basement, then pass it to the next friend for the first floor, and so on.</p>
                </section>

                <div class="divider"></div>

                <h2>Option 1: Tensor Parallelism (TP)</h2>
                <p>Splits a single Matrix Multiplication across GPUs. Each GPU computes part of the output row or column.</p>
                <p><strong>Best for:</strong> High-speed connections like NVLink within a single server.</p>

                <h2>Option 2: Pipeline Parallelism (PP)</h2>
                <p>Splits the model's layers across GPUs. GPU 1 handles layers 1-10, GPU 2 handles 11-20.</p>
                <p><strong>Best for:</strong> Models that are too large for one server's VRAM.</p>

                <h2>Option 3: Data Parallelism (DP)</h2>
                <p>Keeps the whole model on every GPU but splits the data. Each GPU processes a different batch of images or text.</p>

                        <tr><td>Model is too deep (too many layers)</td><td>Pipeline (PP)</td></tr>
                        <tr><td>Training is too slow</td><td>Data (DP)</td></tr>
                    </tbody>
                </table>

                <p><strong>Key takeaway:</strong> Sharding turns a cluster of individual GPUs into a single, unified intelligence fabric by strategically partitioning math and memory.</p>

                <section>

                <div class="breadcrumb">Docs <span>/</span> API Reference <span>/</span> Python API</div>
                <h1>Python Module API</h1>
                
                <section>
                    <h3>What is it?</h3>
                    <p>The Python API is the primary way developers build and interact with neural networks in NEF2. The core of this API is the <code>nef2.Module</code> class and its unique Pipeline Engine (the <code>&gt;&gt;</code> operator).</p>
                </section>

                <section>
                    <h3>Why does it exist?</h3>
                    <p>Writing raw math operations for a 100-layer network is unmanageable. The <code>Module</code> API provides object-oriented building blocks (like <code>Linear</code> or <code>LayerNorm</code>) that automatically track their own parameters (weights) and gradients for training.</p>
                </section>

                <section>
                    <h3>How does it work?</h3>
                    <p>A <code>Module</code> is like a lego block. It holds data (Parameters) and logic (a <code>forward()</code> function). When you pass data through a module, it applies its logic to the data. NEF2 introduces a unique feature: <strong>Pipelining</strong>. Instead of writing complex wrapper classes to connect multiple models together, you can literally "pipe" the output of one model directly into another using the <code>&gt;&gt;</code> symbol.</p>
                </section>

                <div class="divider"></div>

                <h2>Pipeline Chaining</h2>
                <p>The <code>&gt;&gt;</code> operator creates a seamless <code>Pipeline</code> object.</p>
                <div class="code-block">
                    <div class="code-header"><span class="code-lang">python</span><button class="copy-btn">Copy</button></div>
                    <div class="code-content"><pre><span class="kw">import</span> nef2
<span class="kw">from</span> nef2.nn <span class="kw">import</span> Module, Linear, ReLU

<span class="kw">class</span> SimpleModel(Module):
    <span class="kw">def</span> __init__(self):
        self.layer1 = Linear(128, 256)
        self.relu = ReLU()
        self.layer2 = Linear(256, 10)

    <span class="kw">def</span> forward(self, x):
        <span class="cmt"># Using the Pipeline Engine (>>) to chain execution</span>
        <span class="kw">return</span> self.layer1(x) >> self.relu >> self.layer2</pre></div>
                </div>

                <div class="divider"></div>

                <h3>Common Mistakes</h3>
                <ul>
                    <li><strong>Forgetting <code>Parameter()</code>:</strong> Storing weights in a simple list (<code>self.w = [1, 2]</code>) instead of a <code>nef2.Parameter</code>. If it's not a Parameter, the <code>Module</code> cannot find it during training and the weights won't update.</li>
                    <li><strong>Direct Call instead of Forward:</strong> It is standard to call the instance directly (<code>my_model(data)</code>) rather than explicitly calling <code>my_model.forward(data)</code>, as the direct call triggers behind-the-scenes framework hooks.</li>
                </ul>

                <p><strong>Key takeaway:</strong> The NEF2 Python API uses <code>Module</code> classes for state management and the expressive <code>&gt;&gt;</code> operator for effortlessly chaining complex model architectures.</p>
            `,
            community: `
                <div class="breadcrumb">Docs <span>/</span> API Reference <span>/</span> Community</div>
                <h1>GitHub Community</h1>
                <p>Join the thousands of developers building on the Next Evolution Framework.</p>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <div class="gh-star-btn" data-user="Hexa08" data-repo="NEF2" style="border-radius: 20px; background: #000; padding: 4px 16px;">
                        <span style="color:#fff; font-weight: 600;">GitHub Stars</span>
                        <span class="star-count" style="color:#fff;">0</span>
                    </div>
                </div>
            `
        };

        // Stub missing pages with a detailed look
        NAV_DATA.forEach(group => {
            group.items.forEach(item => {
                if (!PAGES[item.id]) {
                    PAGES[item.id] = `
                        <div class="breadcrumb">Docs <span>/</span> ${group.label} <span>/</span> ${item.title}</div>
                        <h1>${item.title}</h1>
                        <p>Technical specifications for <strong>${item.title}</strong> within the NEF2 framework.</p>
                        <div class="callout callout-info">
                            <div class="feature-title">Technical Note</div>
                            <div class="feature-desc">This component is part of the core NEF2 HAL (Hardware Abstraction Layer). It ensures 1:1 hardware mapping with minimal latency.</div>
                        </div>
                        <div class="divider"></div>
                        <h2>Overview</h2>
                        <p>NEF2 targets this component to provide zero-copy access and peak performance. Our implementation focuses on memory bandwidth efficiency and asynchronous task dispatch.</p>
                    `;
                }
            });
        });

        const contentTarget = document.getElementById('content-target');
        const navContent = document.getElementById('nav-content');
        const tocContent = document.getElementById('toc-content');
        const scrollContainer = document.getElementById('scroll-container');
        const progressBar = document.getElementById('reading-progress');
        const sidebarLeft = document.querySelector('.sidebar-left');
        const menuToggle = document.getElementById('menu-toggle');
        const mobileOverlay = document.getElementById('mobile-overlay');

        function renderNav() {
            let html = '';
            NAV_DATA.forEach(group => {
                html += `<span class="nav-group-label">${group.label}</span>`;
                group.items.forEach(item => {
                    html += `
                        <a href="#${item.id}" class="nav-item" data-id="${item.id}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            ${item.title}
                        </a>
                    `;
                });
            });
            navContent.innerHTML = html;
        }

        function renderPage(id) {
            const cleanId = id.startsWith('h-') ? window.location.hash.split('#')[1] : id;
            const safeId = PAGES[cleanId] ? cleanId : 'overview';
            
            contentTarget.innerHTML = PAGES[safeId];
            
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.getAttribute('data-id') === safeId);
            });

            bindCopyButtons();
            generateTOC();
            scrollContainer.scrollTop = 0;

            sidebarLeft.classList.remove('open');
            mobileOverlay.classList.remove('active');
        }

        function generateTOC() {
            const headers = contentTarget.querySelectorAll('h2');
            let html = '';
            headers.forEach((h, i) => {
                const id = 'h-' + i;
                h.id = id;
                html += `<a href="#${id}" class="toc-link" data-id="${id}">${h.innerText}</a>`;
            });
            tocContent.innerHTML = html;
        }

        function bindCopyButtons() {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    const code = btn.closest('.code-block').querySelector('pre').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        const old = btn.innerText;
                        btn.innerText = 'Copied ✓';
                        setTimeout(() => btn.innerText = old, 1500);
                    });
                };
            });
        }

        menuToggle.onclick = () => {
            sidebarLeft.classList.toggle('open');
            mobileOverlay.classList.toggle('active');
        };
        mobileOverlay.onclick = () => {
            sidebarLeft.classList.remove('open');
            mobileOverlay.classList.remove('active');
        };

        document.getElementById('sidebar-filter').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.nav-item').forEach(item => {
                const visible = item.innerText.toLowerCase().includes(term);
                item.style.display = visible ? 'flex' : 'none';
            });
        };

        scrollContainer.onscroll = () => {
            const winScroll = scrollContainer.scrollTop;
            const height = scrollContainer.scrollHeight - scrollContainer.clientHeight;
            progressBar.style.width = (winScroll / height * 100) + '%';

            const headers = contentTarget.querySelectorAll('h2');
            headers.forEach(h => {
                const rect = h.getBoundingClientRect();
                if (rect.top >= 0 && rect.top <= 200) {
                    document.querySelectorAll('.toc-link').forEach(link => {
                        link.classList.toggle('active', link.getAttribute('data-id') === h.id);
                    });
                }
            });
        };

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (!hash.startsWith('h-')) {
                renderPage(hash);
            }
        });

        // GitHub Stars Logic
        function initStarButtons() {
            const buttons = document.querySelectorAll('.gh-star-btn');
            buttons.forEach(btn => {
                fetchAndAnimate(btn);
                btn.onclick = (e) => {
                    e.preventDefault();
                    const rect = btn.getBoundingClientRect();
                    createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
                    window.open(`https://github.com/Hexa08/NEF2`, '_blank');
                };
            });
        }

        async function fetchAndAnimate(btn) {
            const countEl = btn.querySelector('.star-count');
            try {
                const response = await fetch(`https://api.github.com/repos/Hexa08/NEF2`);
                const data = await response.json();
                const stars = data.stargazers_count || 0;
                countEl.innerText = stars >= 1000 ? (stars/1000).toFixed(1) + 'k' : stars;
            } catch (e) {
                countEl.innerText = '0';
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const tx = (Math.random() - 0.5) * 120;
                const ty = (Math.random() - 0.5) * 120;
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                p.style.background = `hsl(${45 + Math.random() * 15}, 100%, 50%)`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        renderNav();
        const initialHash = window.location.hash.slice(1);
        renderPage(initialHash || 'overview');
        initStarButtons();
    </script>
</body>
</html>
